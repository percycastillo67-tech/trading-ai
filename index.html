<script>

const API = "https://trading-ai-gc2b.onrender.com";

document.addEventListener("DOMContentLoaded", async () => {

  const chartContainer = document.getElementById('chart');

  if (!chartContainer) {
    console.log("No se encontró el chart");
    return;
  }

  const chart = LightweightCharts.createChart(chartContainer, {
    width: chartContainer.clientWidth,
    height: 400,
    layout: {
      backgroundColor: '#0b0f1a',
      textColor: '#DDD',
    },
    grid: {
      vertLines: { color: '#222' },
      horzLines: { color: '#222' },
    },
  });

  const lineSeries = chart.addLineSeries();

  // ✅ Datos válidos con timestamps reales
  const data = [];
  let price = 100;
  const start = Math.floor(Date.now() / 1000);

  for (let i = 0; i < 50; i++) {
    price += (Math.random() - 0.5) * 2;

    data.push({
      time: start + i * 60,
      value: price
    });
  }

  lineSeries.setData(data);

  // ✅ Llamada a tu API
  try {
    const res = await fetch(`${API}/monitor`);
    const result = await res.json();

    document.getElementById("signal").innerText = result.join(" | ");
  } catch (err) {
    document.getElementById("signal").innerText = "Error API";
    console.log(err);
  }

});

</script>
